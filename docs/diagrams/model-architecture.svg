  <title
     id="title">Siamese-MicroPerf architecture</title>
  <desc
     id="desc">Basic architecture diagram for Siamese-MicroPerf showing paired inputs, a shared encoder with CNN, BiLSTM, or Transformer backbones, mask-aware pooling, explicit contrast fusion, an MLP head, and the final ratio prediction.</desc>
