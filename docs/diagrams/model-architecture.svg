   baseline-shift="sub"
   font-size="70%"
   id="tspan2">v1</tspan>, <tspan
   font-style="italic"
   id="tspan3">S</tspan><tspan
   baseline-shift="sub"
   font-size="70%"
   id="tspan4">v2</tspan>) → <tspan
   font-style="italic"
   id="tspan5">f</tspan><tspan
   baseline-shift="sub"
   font-size="70%"
   id="tspan6">θ</tspan> → Pool(·) → [<tspan
   font-style="italic"
   id="tspan7">V</tspan><tspan
   baseline-shift="sub"
   font-size="70%"
   id="tspan8">v1</tspan>; <tspan
