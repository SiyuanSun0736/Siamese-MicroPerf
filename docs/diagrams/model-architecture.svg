   id="tspan11">V</tspan><tspan
   baseline-shift="sub"
   font-size="70%"
   id="tspan12">v1</tspan> − <tspan
   font-style="italic"
   id="tspan13">V</tspan><tspan
   baseline-shift="sub"
   font-size="70%"
   id="tspan14">v2</tspan>] → <tspan
   font-style="italic"
   id="tspan15">g</tspan><tspan
   baseline-shift="sub"
   font-size="70%"
   id="tspan16">φ</tspan> → Ŷ</text>
