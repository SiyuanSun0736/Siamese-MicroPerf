       y="54"
       font-size="34"
       font-weight="700"
       text-anchor="middle"
       id="text1">Siamese-MicroPerf Architecture</text>
    <text
       x="800"
       y="88"
       font-size="18"
       font-weight="500"
       text-anchor="middle"
       id="text16">(<tspan
   font-style="italic"
