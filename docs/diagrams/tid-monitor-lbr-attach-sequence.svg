  <text
     class="title"
     x="60"
     y="55"
     id="text2">Dynamic LBR attachment when -T is enabled</text>
  <text
     class="subtitle"
     x="60"
     y="84"
     id="text3">New threads are discovered through proc connector and attached to independent LBR slots before later drains aggregate their branch samples</text>
