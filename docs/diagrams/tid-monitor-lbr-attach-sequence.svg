  <path
     class="msg"
     d="M 808 545 L 1012 545"
     id="path14" />
  <text
     class="label"
     x="843.34137"
     y="533.83295"
     id="text15"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">lbr_add_tid(child_tid)</text>
  <path
     class="msg"
     d="M 1020 595 L 1020 640"
     id="path15" />
  <text
     class="label"
     x="755.30164"
     y="610.83777"
     id="text16"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">open perf_event and mmap a new slot</text>
  <path
     class="ret"
     d="M 1020 690 L 808 690"
     id="path16" />
  <text
     class="label"
     x="822.50842"
     y="676.33411"
     id="text17"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">child thread now has independent LBR collection</text>
  <path
     class="msg"
     d="M 1180 745 L 1028 745"
     id="path17" />
  <text
     class="label"
     x="957.52521"
     y="729.66827"
     id="text18"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">next sampling window iterates all active slots</text>
  <path
     class="ret"
     d="M 1020 790 L 1188 790"
     id="path18" />
  <text
     class="label"
     x="936.71631"
     y="773.00238"
     id="text19"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">child branch samples included in aggregate stats</text>
  <path
     class="msg"
     d="M 143 835 L 347 835"
     id="path19" />
  <text
     class="label"
     x="208"
     y="823"
