         fill="#2f4652"
         id="path1" />
    </marker>
    <marker
       id="arrowLight"
       markerWidth="10"
       markerHeight="10"
       refX="8"
       refY="5"
       orient="auto">
      <path
         d="M 0 0 L 10 5 L 0 10 z"
