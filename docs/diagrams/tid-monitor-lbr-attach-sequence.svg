     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">on_tid_dead(tid) -&gt; lbr_remove_tid(tid)</text>
  <g
     id="g30"
     transform="translate(-16.658656,-139.93271)">
    <rect
       class="note"
       x="69.985626"
       y="559.9856"
       width="317.10895"
       height="89.194153"
       id="rect22" />
    <text
       class="note-text"
       x="74.508408"
       y="578.83777"
       id="text23"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">The key point is timing:</text>
    <text
       class="note-text"
       x="74.330826"
       y="597.86469"
       id="text24"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">new threads are attached as soon as the netlink</text>
    <text
       class="note-text"
       x="73.152885"
       y="617.74188"
       id="text25"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">event is dispatched, instead of waiting for a later</text>
    <text
       class="note-text"
       x="72.563911"
       y="637.03009"
       id="text26"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">manual rescan of the thread tree.</text>
  </g>
  <g
     id="g31"
     transform="translate(-2.9448622,24.14787)">
    <rect
       class="note"
       x="930.01953"
       y="320.01953"
       width="311.76544"
       height="92.660172"
       id="rect26" />
    <text
       class="note-text"
       x="936.68671"
       y="339.16544"
       id="text27"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">This does not change PMU counter inheritance.</text>
    <text
       class="note-text"
       x="936.68671"
       y="359.0426"
       id="text28"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">It only compensates for the fact that</text>
    <text
       class="note-text"
       x="936.09772"
       y="380.09775"
       id="text29"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">LBR cannot be opened with inherit=1.</text>
    <text
       class="note-text"
       x="936.68671"
       y="401.15289"
       id="text30"
       style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">Each child TID gets its own slot.</text>
  </g>
