     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">PROC_EVENT_EXIT</text>
  <path
     class="msg"
     d="M 593 885 L 792 885"
     id="path21" />
  <text
     class="label"
     x="601.69952"
