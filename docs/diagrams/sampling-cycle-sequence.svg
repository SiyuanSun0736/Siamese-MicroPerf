      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #1e2a33; }
      .subtitle { font: 500 16px 'DejaVu Sans', sans-serif; fill: #4e6170; }
      .actor { fill: #fffdf8; stroke: #556974; stroke-width: 2; rx: 10; }
      .actor-text { font: 700 18px 'DejaVu Sans', sans-serif; fill: #17232d; text-anchor: middle; }
      .lifeline { stroke: #8ca0ab; stroke-width: 2; stroke-dasharray: 8 8; }
      .msg { stroke: #2f4652; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #6a7e89; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowLight); }
      .label { font: 600 15px 'DejaVu Sans', sans-serif; fill: #20303c; }
      .note { fill: #efe3bf; stroke: #8a6e2a; stroke-width: 1.5; rx: 10; }
      .note-text { font: 600 14px 'DejaVu Sans', sans-serif; fill: #5b4818; }
      .phase { fill: #dfe9dc; stroke: #42603d; stroke-width: 1.5; rx: 12; }
      .phase-text { font: 700 16px 'DejaVu Sans', sans-serif; fill: #274027; }
