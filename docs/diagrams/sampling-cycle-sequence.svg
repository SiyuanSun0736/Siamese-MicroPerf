  <title
     id="title">Sampling cycle sequence from pmu_monitor to feature engineering</title>
  <desc
     id="desc">A sequence diagram showing one sampling tick: timerfd wakes pmu_monitor, PMU counters are read, LBR is drained, a CSV row is written, and later the Python pipeline converts rows into MPKI and normalized tensors.</desc>
  <defs
     id="defs2">
