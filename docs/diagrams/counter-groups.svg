  <text
     class="text-body"
     x="988.23499"
     y="268.71387"
     id="text21"
     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">icache_miss_mpki</text>
  <text
     class="text-body"
     x="988.23499"
     y="290.71387"
     id="text22"
     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">itlb_load_mpki, itlb_miss_mpki</text>
  <rect
     class="box"
     x="980.04224"
     y="345.01511"
     width="228.20457"
     height="94.979431"
