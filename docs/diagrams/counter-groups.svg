     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">branch_miss_mpki</text>
  <rect
     class="box"
     x="961.87347"
     y="474.76685"
     width="247.01523"
     height="137.26732"
     id="rect25" />
  <text
     class="text-title"
     x="970.70795"
     y="511.76205"
     id="text26"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'DejaVu Sans', sans-serif">Why grouping matters</text>
  <text
     class="text-body"
     x="970.70795"
     y="536.76202"
     id="text27"
     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif"><tspan
       sodipodi:role="line"
       id="tspan32"
       x="970.70795"
       y="536.76202">related numerator / denominator</tspan><tspan
       sodipodi:role="line"
       id="tspan33"
       x="970.70795"
       y="555.51202">pairs observe the same scheduling</tspan><tspan
       sodipodi:role="line"
       x="970.70795"
       y="574.26202"
       id="tspan34">window and the same multiplex</tspan><tspan
       sodipodi:role="line"
       x="970.70795"
       y="593.01202"
       id="tspan36">correction basis</tspan></text>
  <text
     class="text-body"
     x="988.23499"
     y="555.71387"
     id="text28"
     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif" />
  <text
     class="text-body"
     x="988.23499"
     y="577.71387"
     id="text29"
     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif" />
  <path
     class="arrow"
     d="M 576.95182,267 H 971.96313"
     id="path29" />
  <path
     class="arrow"
     d="M 890 267 L 972 388"
     id="path30" />
  <rect
     class="note"
     x="80.013512"
     y="690.01355"
     width="1161.0151"
     height="104.97298"
     id="rect30" />
  <text
     class="note-text"
     x="92.067673"
     y="723"
     id="text30"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">Group A is the critical one for feature engineering because its leader, inst_retired.any, is the denominator used to normalize the other front-end events into MPKI.</text>
  <text
     class="note-text"
     x="92.067673"
     y="750"
     id="text31"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">Group B keeps branch-instructions and branch-misses in the same perf group so branch-related ratios are read from a consistent time window instead of unrelated multiplex states.</text>
  <text
     class="note-text"
     x="92.067673"
     y="777"
     id="text32"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:14px;line-height:normal;font-family:'DejaVu Sans', sans-serif">The groups do not change which counters are collected; they control how reliably those counters can be compared after scaling.</text>
  <text
     xml:space="preserve"
     style="writing-mode:lr-tb;direction:ltr;fill:#000000"
     x="1119.444"
     y="573.0578"
     id="text35"><tspan
       sodipodi:role="line"
       id="tspan35"></tspan></text>
