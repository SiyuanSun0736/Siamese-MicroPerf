  <title
     id="title">PMU counter grouping in pmu_monitor</title>
  <desc
     id="desc">A diagram showing Group A and Group B in pmu_monitor, their leader counters, member counters, shared multiplex scaling semantics, and how Group A supports MPKI construction.</desc>
