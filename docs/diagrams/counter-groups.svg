  <text
     class="text-body"
     x="988.23499"
     y="398.71387"
     id="text24"
     style="font-style:normal;font-variant:normal;font-weight:500;font-stretch:normal;font-size:15px;line-height:normal;font-family:'DejaVu Sans', sans-serif">branch_inst_mpki</text>
  <text
     class="text-body"
     x="988.23499"
     y="420.71387"
